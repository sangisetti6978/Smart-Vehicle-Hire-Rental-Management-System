# Application Configuration
spring.application.name=Vehicle Rental Platform
server.port=8888

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:file:./data/vehiclerental;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema with data.sql after Hibernate creates tables
spring.sql.init.mode=always
spring.sql.init.schema-locations=
spring.jpa.defer-datasource-initialization=true

# H2 Console (access at http://localhost:8888/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024VehicleRentalPlatformSecureKey
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/vehicles

# Email Configuration (Configure with your SMTP details)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Scheduler Configuration
booking.cancellation.delay=7200000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.vehiclerental=DEBUG
logging.level.org.springframework.security=DEBUG
