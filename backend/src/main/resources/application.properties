# Application Configuration
spring.application.name=Vehicle Rental Platform
server.port=8888

# Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=vehiclerental
spring.datasource.password=vehiclerental123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024VehicleRentalPlatformSecureKey
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads/vehicles

# Email Configuration (Configure with your SMTP details)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Scheduler Configuration
booking.cancellation.delay=7200000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.vehiclerental=DEBUG
logging.level.org.springframework.security=DEBUG
