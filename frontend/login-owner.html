<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - Vehicle Rental Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-header">
            <a href="choose-role.html" class="back-home">
                <span class="back-arrow">←</span> Change Role
            </a>
            <div class="logo-large">
                <span class="logo-icon">🚗</span>
                <h1>Vehicle Rental</h1>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-card owner-theme">
                <div class="auth-card-header">
                    <span class="role-badge owner">
                        <span>🏪</span> Owner Portal
                    </span>
                    <h2>Welcome Back, Partner!</h2>
                    <p>Sign in to manage your vehicle business</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div id="error-message" class="error-msg"></div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn owner-btn" id="submitBtn">
                        Sign In
                    </button>
                </form>

                <div class="auth-links">
                    <p>Don't have an account? <a href="register-owner.html">Become a Partner</a></p>
                    <div class="switch-role">
                        <a href="login-customer.html">Sign in as Customer instead</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggle.textContent = '👁';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const submitBtn = document.getElementById('submitBtn');
            
            errorDiv.classList.remove('show');
            submitBtn.classList.add('btn-loading');
            submitBtn.textContent = 'Signing in...';
            
            try {
                const response = await apiCall('/api/auth/login', 'POST', { email, password });
                
                if (response.role !== 'OWNER') {
                    throw new Error('This login is for vehicle owners only. Please use the customer login.');
                }
                
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response));
                
                window.location.href = 'owner-dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                errorDiv.classList.add('show');
                submitBtn.classList.remove('btn-loading');
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
